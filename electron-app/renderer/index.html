<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Clip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 自定义标题栏 -->
    <div class="title-bar">
        <div class="title-bar-left">
            <span class="app-icon">✨</span>
            <span class="app-name">AI Clip</span>
        </div>
        <div class="window-controls">
            <button class="window-btn minimize" id="minimizeBtn">−</button>
            <button class="window-btn maximize" id="maximizeBtn">□</button>
            <button class="window-btn close" id="closeBtn">×</button>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-title">AI Clip</div>
            <div class="nav-items-container">
                <div class="nav-item active" data-page="draft">
                    <span class="nav-text">草稿箱</span>
                </div>
                <div class="nav-item" data-page="search">
                    <span class="nav-text">智能检索</span>
                </div>
                <div class="nav-item highlight" data-page="smart-edit">
                    <span class="nav-text">智能剪辑</span>
                </div>
                <div class="nav-item" data-page="settings">
                    <span class="nav-text">设置</span>
                </div>
            </div>
        </nav>

        <!-- 内容区域 -->
        <main class="content-area">
            <div class="page active" id="page-draft">
                <div class="page-inner">
                    <div class="empty-state">
                        <div class="empty-icon" aria-hidden="true">📝</div>
                        <h2>草稿箱</h2>
                        <p>查看和继续编辑未完成的视频项目</p>
                    </div>
                </div>
            </div>
            <div class="page" id="page-search">
                <div class="page-inner">
                    <div class="empty-state">
                        <div class="empty-icon" aria-hidden="true">🔍</div>
                        <h2>智能检索</h2>
                        <p>通过关键词或语义快速定位所需素材</p>
                    </div>
                </div>
            </div>
            <div class="page" id="page-smart-edit">
                <div class="page-inner">
                    <div class="empty-state">
                        <div class="empty-icon" aria-hidden="true">✂️</div>
                        <h2>智能剪辑</h2>
                        <p>AI 辅助剪辑，让创作更高效</p>
                    </div>
                </div>
            </div>
            <div class="page" id="page-settings">
                <div class="page-inner">
                    <div class="empty-state">
                        <div class="empty-icon" aria-hidden="true">⚙️</div>
                        <h2>设置</h2>
                        <p>配置应用偏好与系统选项</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
