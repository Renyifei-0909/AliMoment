<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI智剪</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 自定义标题栏 -->
    <div class="title-bar">
        <div class="title-bar-left">
            <span class="app-icon">✨</span>
            <span class="app-name">AI智剪</span>
        </div>
        <div class="window-controls">
            <button class="window-btn minimize" id="minimizeBtn">−</button>
            <button class="window-btn maximize" id="maximizeBtn">□</button>
            <button class="window-btn close" id="closeBtn">×</button>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-title">AI智剪</div>
            <div class="nav-items-container">
                <div class="nav-item active" data-page="draft">
                    <span class="nav-text">草稿箱</span>
                </div>
                <div class="nav-item" data-page="search">
                    <span class="nav-text">智能检索</span>
                </div>
                <div class="nav-item" data-page="smart-edit">
                    <span class="nav-text">智能剪辑</span>
                </div>
                <div class="nav-item" data-page="settings">
                    <span class="nav-text">设置</span>
                </div>
            </div>
        </nav>

        <!-- 内容区域 -->
        <main class="content-area">
            <div class="page active" id="page-draft"></div>
            <div class="page" id="page-search"></div>
            <div class="page" id="page-smart-edit"></div>
            <div class="page" id="page-settings"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
